<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafor Stylist 💅</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #ffe6f2;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 450px;
            margin: 0 auto;
            background-color: #ffe6f2;
            border-radius: 10px;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            color: #cc0066;
            margin-bottom: 30px;
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background-color: #ffcce6;
            color: #cc0066;
            border: none;
            border-radius: 5px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }
        
        .btn-danger {
            background-color: #ff4d4d;
            color: white;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        
        .modal-content {
            background-color: #fff0f5;
            margin: 15% auto;
            padding: 20px;
            width: 80%;
            max-width: 350px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💅 Mafor Stylist 💅</h1>
        </div>
        
        <button class="btn" onclick="abrirAgendar()">📅 Agendar cita</button>
        <button class="btn" onclick="verHorarios()">📋 Ver horarios libres</button>
        <button class="btn" onclick="verPrecios()">💰 Ver precios</button>
        <button class="btn" onclick="abrirMapa()">📍 Ver ubicación (Google Maps)</button>
        <button class="btn btn-danger" onclick="cerrarApp()">❌ Salir</button>
    </div>
    
    <!-- Modales -->
    <div id="modalPrecios" class="modal">
        <div class="modal-content">
            <h2>✨ Nuestros Servicios ✨</h2>
            <p>Uñas Acrílicas - $350</p>
            <p>Gel Semipermanente - $150</p>
            <p>Gel Rubber - $250</p>
            <p>Manicura - $250</p>
            <button onclick="cerrarModal('modalPrecios')">⬅ Regresar</button>
        </div>
    </div>
    
    <script>
        // Aquí iría la lógica de JavaScript
        function abrirMapa() {
            window.open("https://www.google.com/maps/search/?api=1&query=25+norte+7204+La+Loma+Puebla");
        }
        
        function cerrarApp() {
            window.close();
        }
        
        function verPrecios() {
            document.getElementById('modalPrecios').style.display = 'block';
        }
        
        function cerrarModal(id) {
            document.getElementById(id).style.display = 'none';
        }
    </script>
</body>
</html>
